name: "Tofu"

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  tofu:
    name: "Tofu"
    runs-on: ubuntu-latest
    environment: dev
    env:
      #ARM_USE_MSI: true
      #ARM_MSI_API_VERSION: "2019-08-01" # optional, defaults to 2018-02-01. Some Azure services require a newer API version due to local implementation conditions. e.g. Running in Azure Container Apps requires `2019-08-01`.
      ARM_SUBSCRIPTION_ID: "4b01b122-02ef-440c-a7d0-85cf2a54b7a9"
      ARM_TENANT_ID: "b2748d0a-856e-4184-bda8-831f9ffa8a48"
      ARM_CLIENT_ID: "e6b7ba11-9782-456c-a8c1-b92b77d18be3"
      # TODO: import TF_VAR variables as github environment variables
      TF_VAR_azure_rg_name: "RG-Fabian-Konrad"
      TF_VAR_app_stage: "dev"

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform/app

    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: "e6b7ba11-9782-456c-a8c1-b92b77d18be3"
          tenant-id: "b2748d0a-856e-4184-bda8-831f9ffa8a48"
          subscription-id: "4b01b122-02ef-440c-a7d0-85cf2a54b7a9"

      # Checkout the repository to the GitHub Actions runner
      - name: Checkout
        uses: actions/checkout@v4

      # Install the latest version of Tofu CLI
      - name: Setup Tofu
        uses: opentofu/setup-opentofu@v2

      # Initialize a new or existing Tofu working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Tofu Init
        run: tofu init

      # Checks that all Tofu configuration files adhere to a canonical format
      - name: Tofu Format
        run: tofu fmt -check

      # Generates an execution plan for Tofu
      - name: Tofu Plan
        run: tofu plan -input=false

        # On push to "master", build or change infrastructure according to Tofu configuration files
        # Note: It is recommended to set up a required "strict" status check in your repository for "Tofu Cloud". See the documentation on "strict" required status checks for more information: https://help.github.com/en/github/administering-a-repository/types-of-required-status-checks
      - name: Tofu Apply
        if: github.ref == 'refs/heads/"master"' && github.event_name == 'push'
        run: tofu apply -auto-approve -input=false
